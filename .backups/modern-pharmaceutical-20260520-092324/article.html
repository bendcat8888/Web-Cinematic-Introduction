<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <title>Article – InnoGen Pharmaceuticals Inc.</title>
  <script>
    (() => {
      const params = (() => {
        try { return new URLSearchParams(location.search); } catch (e) { return null; }
      })();
      const id = params ? params.get('id') : null;
      const slug = params ? params.get('slug') : null;
      if (!id && !slug) {
        location.replace('../index.html#/news-insights');
        return;
      }
      fetch('../assets/content/content.json').then(r => r.json()).then(data => {
        const posts = Array.isArray(data && data.posts) ? data.posts : [];
        let p = null;
        if (slug) p = posts.find(x => x && String(x.slug || '') === String(slug));
        if (!p && id) p = posts.find(x => x && String(x.id || '') === String(id));
        const key = p && p.slug ? String(p.slug) : (slug || id);
        if (!key) {
          location.replace('../index.html#/news-insights');
          return;
        }
        location.replace('../index.html#/article/' + encodeURIComponent(key));
      }).catch(() => {
        location.replace('../index.html#/news-insights');
      });
    })();
  </script>
  <style>
    :root{
      --bg0:#070712;
      --bg1:#0a0a1a;
      --ink:#e9e8ff;
      --muted:#b8b6da;
      --stroke: rgba(190, 175, 255, 0.18);
      --glass: rgba(16, 14, 34, 0.55);
      --shadow: rgba(0,0,0,0.55);
      --btn: linear-gradient(90deg, rgba(122,53,255,0.95), rgba(182,77,255,0.85), rgba(255,58,168,0.72));
      --r: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 900px at 70% 20%, rgba(122,53,255,0.10), transparent 55%),
                  radial-gradient(900px 700px at 25% 65%, rgba(59,241,255,0.07), transparent 60%),
                  radial-gradient(ellipse 140% 60% at 30% 100%, rgba(59,241,255,0.09), transparent 55%),
                  radial-gradient(ellipse 80% 50% at 80% 90%, rgba(122,53,255,0.07), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg0));
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      overflow-x:hidden;
      padding-top: 92px;
    }

    .topbar{
      position:fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 14px 0;
      z-index: 10;
      opacity: 1;
      transform: translateY(0);
      pointer-events:auto;
    }

    .topbar > div{
      width: 100%;
      display:block;
    }

    .topbar-inner{
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(190,175,255,0.16);
      background: rgba(10,9,24,0.30);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      padding: 10px 16px;
      display:grid;
      grid-template-columns: 1fr minmax(0, 760px) 1fr;
      align-items:center;
      column-gap: 16px;
      transition: background 220ms ease, border-color 220ms ease, box-shadow 220ms ease, transform 220ms ease;
    }

    body.is-scrolled .topbar-inner{
      background: rgba(10,9,24,0.62);
      border-color: rgba(59,241,255,0.14);
      box-shadow: 0 20px 68px rgba(0,0,0,0.54);
    }

    .topbar-brand{
      display:flex;
      align-items:center;
      gap: 10px;
      text-decoration:none;
      min-width: 0;
      flex: 0 0 auto;
      justify-self:start;
    }

    .topbar-logo{
      width: 116px;
      height: auto;
      display:block;
      border-radius: 999px;
      background: #ffffff;
      padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }

    .topbar-nav{
      display:flex;
      gap: 12px;
      align-items:center;
      justify-content:center;
      min-width: 0;
      overflow: hidden;
      padding: 0;
      width: 100%;
    }

    .topbar-nav a{
      color: rgba(233,232,255,0.78);
      text-decoration:none;
      font-size: 12px;
      letter-spacing: 0.01em;
      padding: 6px 6px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease;
      white-space:nowrap;
      flex: 0 0 auto;
    }

    .topbar-nav a:hover{
      color: rgba(255,255,255,0.94);
      background: rgba(255,255,255,0.06);
      border-color: rgba(190,175,255,0.16);
    }

    .topbar-more{
      position: relative;
      display:none;
      flex: 0 0 auto;
    }

    .topbar-more-btn{
      appearance:none;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(233,232,255,0.78);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      letter-spacing: 0.01em;
      cursor:pointer;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease;
      white-space:nowrap;
    }

    .topbar-more-btn:hover,
    .topbar-more.is-open .topbar-more-btn{
      color: rgba(255,255,255,0.94);
      background: rgba(255,255,255,0.06);
      border-color: rgba(190,175,255,0.16);
    }

    .topbar-more-menu{
      position:absolute;
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      min-width: 220px;
      border-radius: 14px;
      border: 1px solid rgba(190,175,255,0.16);
      background: rgba(10,9,24,0.86);
      backdrop-filter: blur(12px);
      box-shadow: 0 22px 70px rgba(0,0,0,0.55);
      overflow:hidden;
      opacity: 0;
      pointer-events:none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .topbar-more.is-open .topbar-more-menu{
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
      pointer-events:auto;
    }

    .topbar-more-menu a{
      display:block;
      padding: 12px 14px;
      color: rgba(233,232,255,0.86);
      text-decoration:none;
      border-top: 1px solid rgba(190,175,255,0.10);
      font-size: 13px;
      white-space:nowrap;
    }

    .topbar-more-menu a:first-child{
      border-top: 0;
    }

    .topbar-more-menu a:hover{
      background: rgba(255,255,255,0.06);
    }

    .topbar.is-medium .topbar-nav a.topbar-extra{ display:none; }
    .topbar.is-medium .topbar-more{ display:inline-flex; }

    .topbar.is-compact .topbar-nav{ display:none; }
    .topbar.is-compact .topbar-toggle{ display:inline-flex; }

    .topbar-actions{
      display:flex;
      gap: 10px;
      align-items:center;
      flex: 0 0 auto;
      justify-self:end;
      position: relative;
      z-index: 2;
    }

    @media (max-width: 980px){
      .topbar-inner{
        display: grid !important;
        grid-template-columns: auto 1fr auto !important;
        align-items: center !important;
        width: 100% !important;
      }
      .topbar-nav{ display:none !important; }
      .topbar-cta{ display:none !important; }
      .topbar-toggle{
        display: inline-flex !important;
        visibility: visible !important;
        opacity: 1 !important;
        position: relative !important;
        z-index: 999 !important;
        pointer-events: auto !important;
        justify-self: end !important;
        flex: 0 0 auto;
      }
      .topbar{
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        padding: 14px 20px 0 !important;
        transform: translateY(0) !important;
      }
    }

    .topbar-cta{
      appearance:none;
      border: 1px solid rgba(59,241,255,0.22);
      background: rgba(59,241,255,0.10);
      color: rgba(233,232,255,0.92);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0.01em;
      text-decoration:none;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
      white-space:nowrap;
    }

    .topbar-cta:hover{
      background: rgba(59,241,255,0.14);
      border-color: rgba(59,241,255,0.32);
      transform: translateY(-1px);
    }

    .topbar-toggle{
      appearance:none;
      border: 1px solid rgba(190,175,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(233,232,255,0.86);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor:pointer;
      display:none;
      position: relative;
      z-index: 3;
      gap: 8px;
      align-items: center;
    }

    .topbar-toggle::before{
      content:"";
      width: 18px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(
        to bottom,
        rgba(233,232,255,0.92) 0 2px,
        transparent 2px 5px,
        rgba(233,232,255,0.92) 5px 7px,
        transparent 7px 10px,
        rgba(233,232,255,0.92) 10px 12px
      );
      flex: 0 0 auto;
    }

    .topbar-drawer{
      width: 100%;
      margin-top: 10px;
      border-radius: 18px;
      border: 1px solid rgba(190,175,255,0.16);
      background: rgba(10,9,24,0.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      overflow:hidden;
      max-height: 0;
      opacity: 0;
      pointer-events:none;
      transition: max-height 260ms ease, opacity 220ms ease;
    }

    body.nav-open .topbar-drawer{
      max-height: 420px;
      opacity: 1;
      pointer-events:auto;
    }

    .topbar-drawer a{
      display:block;
      padding: 14px 14px;
      color: rgba(233,232,255,0.86);
      text-decoration:none;
      border-top: 1px solid rgba(190,175,255,0.10);
      font-size: 14px;
    }

    .topbar-drawer a:first-child{
      border-top: 0;
    }

    .topbar-drawer a:hover{
      background: rgba(255,255,255,0.06);
    }

    main{
      width: min(980px, 92vw);
      margin: 18px auto 90px;
    }

    .hero{
      border-radius: calc(var(--r) + 10px);
      border: 1px solid rgba(190,175,255,0.16);
      background: linear-gradient(180deg, rgba(16,14,34,0.55), rgba(10,9,24,0.38));
      box-shadow: 0 28px 90px rgba(0,0,0,0.55);
      padding: clamp(22px, 4.2vw, 44px);
    }
    .kicker{
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(233,232,255,0.62);
      margin: 0 0 10px;
    }
    h1{
      margin: 0;
      font-size: clamp(26px, 3.2vw, 44px);
      line-height: 1.06;
      letter-spacing: -0.02em;
    }
    .meta{
      margin-top: 10px;
      color: rgba(233,232,255,0.70);
      font-size: 13px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .back{
      margin-top: 14px;
      display:inline-block;
      color: rgba(59,241,255,0.86);
      text-decoration: none;
      border-bottom: 1px solid rgba(59,241,255,0.30);
      font-size: 14px;
      padding-bottom: 2px;
    }
    .back:hover{
      color: rgba(255,255,255,0.92);
      border-bottom-color: rgba(59,241,255,0.55);
    }
    .content{
      margin-top: 18px;
      border-radius: calc(var(--r) + 10px);
      border: 1px solid rgba(190,175,255,0.16);
      background: rgba(10,9,24,0.32);
      box-shadow: 0 22px 70px rgba(0,0,0,0.42);
      padding: clamp(18px, 3.0vw, 30px);
      color: rgba(233,232,255,0.88);
      line-height: 1.7;
    }
    .content img{
      max-width: 100%;
      height: auto;
      border-radius: 14px;
      border: 1px solid rgba(190,175,255,0.12);
      box-shadow: 0 16px 50px rgba(0,0,0,0.35);
    }
    .content a{
      color: rgba(59,241,255,0.86);
      text-decoration: none;
      border-bottom: 1px solid rgba(59,241,255,0.30);
    }
    .content a:hover{
      color: rgba(255,255,255,0.92);
      border-bottom-color: rgba(59,241,255,0.55);
    }
    .empty{
      margin-top: 18px;
      color: rgba(233,232,255,0.72);
      font-size: 14px;
      line-height: 1.6;
      border: 1px dashed rgba(190,175,255,0.22);
      border-radius: 18px;
      padding: 16px;
      background: rgba(10,9,24,0.22);
    }
  </style>
</head>
<body class="revealed">
  <header class="topbar" aria-label="Primary navigation">
    <div>
      <div class="topbar-inner">
        <a class="topbar-brand" href="../index.html?skipIntro=1" aria-label="InnoGen Pharmaceuticals Inc.">
          <img class="topbar-logo" src="../assets/InnogenLogo.jpg" alt="InnoGen Pharmaceuticals Inc.">
        </a>
        <nav class="topbar-nav" aria-label="Main">
          <a href="../index.html#about">About</a>
          <a href="../index.html#products">Products</a>
          <a class="topbar-extra" href="../working-with-us.html">Working with us</a>
          <a class="topbar-extra" href="../news-insights.html">News &amp; insights</a>
          <div class="topbar-more" id="topbarMore">
            <button class="topbar-more-btn" id="topbarMoreBtn" type="button" aria-haspopup="menu" aria-expanded="false">More</button>
            <div class="topbar-more-menu" role="menu" aria-label="More links">
              <a role="menuitem" href="../working-with-us.html">Working with us</a>
              <a role="menuitem" href="../news-insights.html">News &amp; insights</a>
            </div>
          </div>
          <a href="../index.html#how">How we work</a>
        </nav>
        <div class="topbar-actions">
          <button class="topbar-toggle" id="navToggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="navDrawer">Menu</button>
          <a class="topbar-cta" href="../index.html#contact">Contact us</a>
        </div>
      </div>
      <div class="topbar-drawer" id="navDrawer" aria-label="Mobile menu">
        <a href="../index.html#about">About</a>
        <a href="../index.html#products">Products</a>
        <a href="../index.html#how">How we work</a>
        <a href="../working-with-us.html">Working with us</a>
        <a href="../news-insights.html">News &amp; insights</a>
        <a href="../index.html#contact">Contact</a>
        <a href="../health-tips.html">Patient’s Health Tips</a>
        <a href="../doctors-portal.html">Doctor’s Portal</a>
        <a href="../index.html#products">Request Product List</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="Article">
      <p class="kicker" id="kicker">Article</p>
      <h1 id="title">Loading…</h1>
      <div class="meta" id="meta" aria-label="Meta"></div>
      <a class="back" id="back" href="../index.html">Back</a>
    </section>

    <article class="content" id="content" aria-label="Content"></article>
    <div class="empty" id="empty" hidden>Article not found.</div>
  </main>

  <script>
    (() => {
      const topbar = document.querySelector('.topbar');
      const topbarNav = topbar ? topbar.querySelector('.topbar-nav') : null;
      const navToggle = document.getElementById('navToggle');
      const navDrawer = document.getElementById('navDrawer');
      const topbarMore = document.getElementById('topbarMore');
      const topbarMoreBtn = document.getElementById('topbarMoreBtn');

      const titleEl = document.getElementById('title');
      const kickerEl = document.getElementById('kicker');
      const metaEl = document.getElementById('meta');
      const contentEl = document.getElementById('content');
      const emptyEl = document.getElementById('empty');
      const backEl = document.getElementById('back');

      function setTopbarMoreOpen(open) {
        if (!topbarMore || !topbarMoreBtn) return;
        const isOpen = !!open;
        topbarMore.classList.toggle('is-open', isOpen);
        topbarMoreBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      }

      function updateTopbarLayout() {
        if (!topbar) return;
        topbar.classList.remove('is-medium', 'is-compact');
        if (!topbarNav) return;
        const fitsLarge = topbarNav.scrollWidth <= (topbarNav.clientWidth + 1);
        if (fitsLarge) return;
        topbar.classList.add('is-medium');
        topbarNav.offsetWidth;
        const fitsMedium = topbarNav.scrollWidth <= (topbarNav.clientWidth + 1);
        if (fitsMedium) return;
        topbar.classList.remove('is-medium');
        topbar.classList.add('is-compact');
        setTopbarMoreOpen(false);
      }

      function updateHeaderState() {
        document.body.classList.toggle('is-scrolled', window.scrollY > 12);
      }

      let navLastFocus = null;
      function setNavOpen(open) {
        const isOpen = !!open;
        document.body.classList.toggle('nav-open', isOpen);
        if (navToggle) navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        if (isOpen) {
          navLastFocus = document.activeElement;
          if (navDrawer) {
            const firstLink = navDrawer.querySelector('a');
            if (firstLink) firstLink.focus({ preventScroll: true });
          }
        } else if (navLastFocus && typeof navLastFocus.focus === 'function') {
          navLastFocus.focus({ preventScroll: true });
          navLastFocus = null;
        }
      }

      if (navToggle) {
        navToggle.addEventListener('click', () => {
          const next = !document.body.classList.contains('nav-open');
          setNavOpen(next);
        });
      }

      if (topbarMore && topbarMoreBtn) {
        topbarMoreBtn.addEventListener('click', () => {
          const next = !topbarMore.classList.contains('is-open');
          setTopbarMoreOpen(next);
          if (next) setNavOpen(false);
        });
      }

      window.addEventListener('click', event => {
        if (!topbarMore) return;
        if (!topbarMore.classList.contains('is-open')) return;
        const within = event.target && topbarMore.contains(event.target);
        if (!within) setTopbarMoreOpen(false);
      }, { capture: true });

      window.addEventListener('keydown', event => {
        if (event.key !== 'Escape') return;
        setTopbarMoreOpen(false);
      });

      window.addEventListener('click', event => {
        const link = event.target && event.target.closest ? event.target.closest('#topbarMore .topbar-more-menu a') : null;
        if (link) setTopbarMoreOpen(false);
      }, { capture: true });

      document.addEventListener('click', event => {
        if (!document.body.classList.contains('nav-open')) return;
        const inTopbar = event.target.closest && event.target.closest('.topbar');
        if (!inTopbar) {
          setNavOpen(false);
          return;
        }
        const drawerLink = event.target.closest && event.target.closest('#navDrawer a');
        if (drawerLink) setNavOpen(false);
      });

      window.addEventListener('scroll', updateHeaderState, { passive: true });
      window.addEventListener('resize', updateTopbarLayout, { passive: true });
      updateHeaderState();
      updateTopbarLayout();

      function normalizeText(s) {
        return String(s || '')
          .replace(/ û /g, ' – ')
          .replace(/Æ/g, '’')
          .replace(/ô/g, '“')
          .replace(/ö/g, '”');
      }

      function formatDate(s) {
        const m = String(s || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m) return '';
        return m[1] + '-' + m[2] + '-' + m[3];
      }

      function cleanWpHtml(html) {
        if (!html) return '';
        let out = String(html);
        out = out.replace(/>n</g, '>\n<');
        out = out.replace(/n<!--/g, '\n<!--');
        out = out.replace(/<!--/g, '<!--');
        return out;
      }

      function pageForCategory(cat) {
        if (cat === 'patients') return '../health-tips.html';
        if (cat === 'doctors') return '../doctors-portal.html';
        if (cat === 'news' || cat === 'csr') return '../news-insights.html';
        return '../index.html';
      }

      async function load() {
        const idParam = new URLSearchParams(location.search).get('id');
        const id = parseInt(idParam || '', 10);
        const res = await fetch('../assets/content/content.json', { cache: 'no-store' });
        const data = await res.json();
        const post = (data.posts || []).find(p => p && p.id === id);

        if (!post) {
          emptyEl.hidden = false;
          contentEl.hidden = true;
          titleEl.textContent = 'Not found';
          kickerEl.textContent = 'Article';
          metaEl.textContent = '';
          backEl.href = '../index.html';
          return;
        }

        document.title = normalizeText(post.title) + ' – InnoGen Pharmaceuticals Inc.';
        titleEl.textContent = normalizeText(post.title);
        kickerEl.textContent = (data.categories && data.categories[post.category] && data.categories[post.category].name) ? data.categories[post.category].name : 'Article';
        metaEl.textContent = normalizeText(post.category) + ' • ' + formatDate(post.date);
        backEl.href = pageForCategory(post.category);
        backEl.textContent = 'Back to ' + (post.category === 'patients' ? 'Patient’s Health Tips' : post.category === 'doctors' ? 'Doctor’s Portal' : 'News & insights');

        contentEl.innerHTML = cleanWpHtml(post.html);

        const imgs = contentEl.querySelectorAll('img');
        imgs.forEach(img => {
          img.loading = 'lazy';
          img.decoding = 'async';
          const src = img.getAttribute('src') || '';
          if (src.indexOf('assets/wp_uploads/') === 0) img.setAttribute('src', '../' + src);
        });

        const anchors = contentEl.querySelectorAll('a[href]');
        anchors.forEach(a => {
          const href = a.getAttribute('href') || '';
          if (href.indexOf('pages/article.html') === 0) a.setAttribute('href', '../' + href);
          if (href.indexOf('health-tips.html') === 0) a.setAttribute('href', '../' + href);
          if (href.indexOf('doctors-portal.html') === 0) a.setAttribute('href', '../' + href);
          if (href.indexOf('working-with-us.html') === 0) a.setAttribute('href', '../' + href);
          if (href.indexOf('news-insights.html') === 0) a.setAttribute('href', '../' + href);
        });
      }

      load().catch(() => {
        emptyEl.hidden = false;
        contentEl.hidden = true;
        titleEl.textContent = 'Unable to load';
      });
    })();
  </script>
</body>
</html>
